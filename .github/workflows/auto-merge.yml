name: Auto-Merge PR

on:
  workflow_run:
    workflows: ["CI Check"]
    types: [completed]

jobs:
  auto-merge:
    # Only when CI Check succeeded and was triggered by a pull_request
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Find and merge PR
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}
          REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          PR_NUMBER=$(gh pr list --repo "$REPO" --state open --base main --head "$HEAD_BRANCH" --json number --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No open PR targeting main for branch '$HEAD_BRANCH' — skipping"
            exit 0
          fi

          echo "Auto-merging PR #$PR_NUMBER (branch: $HEAD_BRANCH)"

          # Read release label before merging
          RELEASE_LABEL=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name | select(startswith("release:"))] | first // empty')
          echo "RELEASE_LABEL=$RELEASE_LABEL" >> "$GITHUB_ENV"
          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"

          if [ "$HEAD_BRANCH" = "development" ]; then
            # Never delete the development branch
            gh pr merge "$PR_NUMBER" --repo "$REPO" --merge
          else
            gh pr merge "$PR_NUMBER" --repo "$REPO" --merge --delete-branch
          fi

      - name: Checkout main
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}
          REPO: ${{ github.repository }}
        run: |
          git clone --branch main "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" /tmp/repo
          cd /tmp/repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version from release label
        if: env.RELEASE_LABEL != ''
        working-directory: /tmp/repo
        run: |
          BUMP_TYPE="${RELEASE_LABEL#release:}"
          echo "Release label: $RELEASE_LABEL → bump type: $BUMP_TYPE"

          CURRENT_VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' backend/pyproject.toml)
          echo "Current version: $CURRENT_VERSION"

          python3 scripts/bump_version.py "$BUMP_TYPE"

          NEW_VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' backend/pyproject.toml)
          echo "New version: $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

          git add backend/pyproject.toml client/package.json CLAUDE.md
          git commit -m "chore: bump version to v${NEW_VERSION}"
          git push origin main

      - name: Auto-tag from pyproject.toml
        working-directory: /tmp/repo
        run: |
          VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' backend/pyproject.toml || true)
          TAG="v${VERSION}"
          if [ -z "$VERSION" ]; then
            echo "Could not read version from pyproject.toml — skipping auto-tag"
          elif git tag -l "$TAG" | grep -q .; then
            echo "Tag $TAG already exists — skipping"
          else
            echo "Creating tag $TAG from pyproject.toml"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Tag $TAG pushed — release workflow will create GitHub Release"
          fi

      - name: Sync development with main
        if: github.event.workflow_run.head_branch == 'development'
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}
          REPO: ${{ github.repository }}
        working-directory: /tmp/repo
        run: |
          git fetch origin main development
          git checkout development
          git merge origin/main --no-edit
          git push origin development
