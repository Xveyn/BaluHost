name: Auto-Merge PR

on:
  workflow_run:
    workflows: ["CI Check"]
    types: [completed]

jobs:
  auto-merge:
    # Only when CI Check succeeded and was triggered by a pull_request
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Find and merge PR
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}
          REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          PR_NUMBER=$(gh pr list --repo "$REPO" --state open --base main --head "$HEAD_BRANCH" --json number --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No open PR targeting main for branch '$HEAD_BRANCH' — skipping"
            exit 0
          fi

          echo "Auto-merging PR #$PR_NUMBER (branch: $HEAD_BRANCH)"

          if [ "$HEAD_BRANCH" = "development" ]; then
            # Never delete the development branch
            gh pr merge "$PR_NUMBER" --repo "$REPO" --merge
          else
            gh pr merge "$PR_NUMBER" --repo "$REPO" --merge --delete-branch
          fi

      - name: Checkout main
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}
          REPO: ${{ github.repository }}
        run: |
          git clone --branch main "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" /tmp/repo
          cd /tmp/repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Auto-tag pre-release
        working-directory: /tmp/repo
        env:
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
        run: |
          VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' backend/pyproject.toml || true)
          if [ -z "$VERSION" ]; then
            echo "Could not read version from pyproject.toml -- skipping pre-release tag"
            exit 0
          fi
          TAG="v${VERSION}-pre.${RUN_NUMBER}"
          if git tag -l "$TAG" | grep -q .; then
            echo "Tag $TAG already exists -- skipping"
          else
            echo "Creating pre-release tag $TAG"
            git tag -a "$TAG" -m "Pre-release $TAG"
            git push origin "$TAG"
            echo "Tag $TAG pushed -- create-release.yml will create the GitHub pre-release"
          fi

      - name: Sync development with main
        if: github.event.workflow_run.head_branch == 'development'
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}
          REPO: ${{ github.repository }}
        working-directory: /tmp/repo
        run: |
          git fetch origin main development
          git checkout development
          if git merge origin/main --ff-only; then
            git push origin development
          else
            echo "::warning::development has diverged from main — skipping sync to avoid merge commit. Next release will reconcile."
          fi
