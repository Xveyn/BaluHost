name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Extract section for this version (between ## [version] and next ---)
          notes=$(awk -v ver="$VERSION" '$0 ~ "^## \\[" ver "\\]" {found=1; next} /^---$/{if(found) exit} found' CHANGELOG.md)
          # Treat whitespace-only output as "not found" so we trigger the fallback
          trimmed=$(printf '%s' "$notes" | tr -d '[:space:]')
          if [ -z "$trimmed" ]; then
            echo "::warning::No CHANGELOG section found for version $VERSION — falling back to auto-generated notes"
            echo "found=false" >> "$GITHUB_OUTPUT"
            : > /tmp/release-notes.md
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "$notes" > /tmp/release-notes.md
          fi

      - name: Determine pre-release
        id: prerelease
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" == *-alpha* ]] || [[ "$TAG" == *-beta* ]] || [[ "$TAG" == *-unstable* ]] || [[ "$TAG" == *-rc* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate fallback notes from GitHub API
        if: steps.notes.outputs.found != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # `gh release edit` does not support --generate-notes, so call the API directly
          # and write the generated body into the same notes file used by the next step.
          gh api \
            --method POST \
            "repos/${REPO}/releases/generate-notes" \
            -f tag_name="$TAG" \
            --jq '.body' > /tmp/release-notes.md
          echo "Fallback notes generated for $TAG ($(wc -c < /tmp/release-notes.md) bytes)"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PRERELEASE_FLAG: ${{ steps.prerelease.outputs.flag }}
        run: |
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, updating..."
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              $PRERELEASE_FLAG
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              $PRERELEASE_FLAG
          fi
