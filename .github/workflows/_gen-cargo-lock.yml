name: _gen-cargo-lock (throwaway)

# Temporary helper: generates a pinned client/src-tauri/Cargo.lock on a
# GitHub-hosted runner, verifies the Tauri build is green with it, and uploads
# the lockfile as an artifact. Deleted before the fix PR is opened.

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate pinned lockfile
        working-directory: client/src-tauri
        run: |
          set -euxo pipefail
          cargo generate-lockfile
          # Unify the brotli stack onto a single alloc-no-stdlib 2.x. brotli 8.0.3
          # requires ^2.0 while brotli-decompressor 5.0.2 widened to >=2.0.4,<4 and
          # the resolver otherwise pulls 3.0.0 alongside 2.0.4 -> trait mismatch.
          cargo update -p alloc-no-stdlib@3.0.0 --precise 2.0.4 || true
          echo "=== alloc-no-stdlib in tree ==="
          cargo tree -i alloc-no-stdlib || true

      - name: Install Tauri OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Build Tauri app (verify lock resolves)
        working-directory: client
        run: npm run tauri:build -- --bundles deb
        env:
          VITE_TAURI: '1'

      - name: Upload generated Cargo.lock
        uses: actions/upload-artifact@v6
        with:
          name: cargo-lock
          path: client/src-tauri/Cargo.lock
          retention-days: 3
