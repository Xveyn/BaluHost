name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sync_permissions:
        description: "Re-apply OS-level permission grants (udev / polkit / sudoers). Leave off for routine deploys."
        type: boolean
        required: false
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci-check:
    uses: ./.github/workflows/ci-check.yml

  deploy:
    needs: ci-check
    # Skip deploy for automated version bump commits and stable-release commits
    # (the code is already on production from the prior pre-release deploy).
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version') && !startsWith(github.event.head_commit.message, 'chore: release v')"
    runs-on: self-hosted
    environment: production
    timeout-minutes: 15

    steps:
      - name: Run deploy script
        env:
          INSTALL_DIR: /opt/baluhost
          DEPLOY_ACTOR: ${{ github.actor }}
          # Push-triggered deploys default to off; workflow_dispatch can opt-in.
          SYNC_PERMISSIONS: ${{ inputs.sync_permissions == true && '1' || '0' }}
        run: |
          export GITHUB_ACTOR="$DEPLOY_ACTOR"
          /opt/baluhost/deploy/scripts/ci-deploy.sh

      - name: Show deploy state
        if: always()
        run: cat /opt/baluhost/.deploy-state 2>/dev/null || echo "No deploy state file"
