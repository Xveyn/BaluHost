name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sync_permissions:
        description: "Re-apply OS-level permission grants (udev / polkit / sudoers). Leave off for routine deploys."
        type: boolean
        required: false
        default: false
      install_companion:
        description: "Build the Tauri Companion app from source on BaluNode and install it system-wide (.deb). Leave off for routine deploys."
        type: boolean
        required: false
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci-check:
    uses: ./.github/workflows/ci-check.yml

  deploy:
    needs: ci-check
    # Skip deploy for automated version bump commits and stable-release commits
    # (the code is already on production from the prior pre-release deploy).
    # Actor allowlist (Layer 3 in .claude/rules/ci-cd-security.md): only Xveyn
    # may trigger a self-hosted production deploy. Xveyn merges PRs to main
    # manually, so the resulting push:main event has github.actor == Xveyn.
    if: >-
      !startsWith(github.event.head_commit.message, 'chore: bump version')
      && !startsWith(github.event.head_commit.message, 'chore: release v')
      && github.actor == 'Xveyn'
    runs-on: [self-hosted, prod]
    environment: production
    # 30 (not 15): an opt-in companion build does a cold Rust compile the first
    # time, which can take several minutes on top of the normal deploy. Routine
    # deploys finish well under this regardless.
    timeout-minutes: 30

    steps:
      - name: Run deploy script
        env:
          INSTALL_DIR: /opt/baluhost
          DEPLOY_ACTOR: ${{ github.actor }}
          # Push-triggered deploys default to off; workflow_dispatch can opt-in.
          SYNC_PERMISSIONS: ${{ inputs.sync_permissions == true && '1' || '0' }}
          INSTALL_COMPANION: ${{ inputs.install_companion == true && '1' || '0' }}
        run: |
          export GITHUB_ACTOR="$DEPLOY_ACTOR"
          /opt/baluhost/deploy/scripts/ci-deploy.sh

      - name: Show deploy state
        if: always()
        run: cat /opt/baluhost/.deploy-state 2>/dev/null || echo "No deploy state file"

      # Pre-release tag is created here (not in a separate merge workflow) so it
      # only lands after a successful production deploy — a tag therefore always
      # corresponds to code that is actually running on prod. Pushed with
      # DEPLOY_PAT (not GITHUB_TOKEN) so the tag-push event triggers
      # create-release.yml. Number is derived from existing tags to stay
      # monotonic per version, independent of any workflow run_number.
      - name: Checkout repo for tagging
        if: success()
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          # Do not persist GITHUB_TOKEN as http.extraheader — it would override
          # the inline DEPLOY_PAT URL on push and 403 as github-actions[bot].
          persist-credentials: false

      - name: Auto-tag pre-release
        if: success()
        env:
          DEPLOY_PAT: ${{ secrets.DEPLOY_PAT }}
        run: |
          # Derive the prerelease base from the last STABLE tag + a patch bump so
          # the prerelease always sorts ABOVE the latest stable. pyproject.toml
          # holds the last RELEASED version (release-stable.yml does not advance it
          # afterwards), so reading it directly produced v<released>-pre.N tags that
          # sort BELOW the stable of the same number (semver: 1.33.0-pre.1 < 1.33.0).
          # Bumping the patch is safe regardless of the eventual stable bump type:
          # v1.33.1-pre.N stays below both v1.33.1 and v1.34.0, and above v1.33.0.
          LAST_STABLE=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -Ev -- '-(pre|rc|alpha|beta|unstable)' | sort -V | tail -1)
          if [ -n "$LAST_STABLE" ]; then
            BASE=${LAST_STABLE#v}
            IFS=. read -r MAJ MIN PAT <<< "$BASE"
            VERSION="${MAJ}.${MIN}.$((PAT + 1))"
          else
            # No stable release yet -- fall back to the pyproject version.
            VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' backend/pyproject.toml || true)
          fi
          if [ -z "$VERSION" ]; then
            echo "Could not determine prerelease base version -- skipping pre-release tag"
            exit 0
          fi
          LATEST=$(git tag -l "v${VERSION}-pre.*" | sed -E 's/.*-pre\.//' | sort -n | tail -1)
          NEXT=$(( ${LATEST:-0} + 1 ))
          TAG="v${VERSION}-pre.${NEXT}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists -- skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Pre-release $TAG"
          git push "https://x-access-token:${DEPLOY_PAT}@github.com/${GITHUB_REPOSITORY}.git" "$TAG"
          echo "Tag $TAG pushed -- create-release.yml will create the GitHub pre-release"

      # The tag above is pushed from this workspace checkout, not from
      # /opt/baluhost — without a fetch, the prod clone is permanently one tag
      # behind itself and `git describe --tags --exact-match` fails, so the UI
      # shows "Dev Build" + the stale pyproject version (#223). Fetch here on
      # the same runner/user that ci-deploy.sh already uses. Non-fatal: the
      # deploy is green and tagged at this point; a fetch failure only leaves
      # today's cosmetic display state. Also runs on the tag step's skip paths,
      # back-filling any previously missed tag on the next deploy.
      - name: Sync tags to production checkout
        if: success()
        # The `||` fallback covers exit codes, not hangs: timeout-minutes caps
        # a hung fetch, and continue-on-error keeps the already-green, tagged
        # deploy run from being failed by that timeout.
        timeout-minutes: 2
        continue-on-error: true
        run: git -C /opt/baluhost fetch origin --tags || echo "::warning::tag fetch into /opt/baluhost failed (display-only impact)"
