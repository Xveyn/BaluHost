name: Tauri Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    # vars.ENABLE_TAURI_BUILD: fork toggle (#207), default on; unset upstream.
    if: vars.ENABLE_TAURI_BUILD != 'false'
    # MUST stay on GitHub-hosted runner per .claude/rules/ci-cd-security.md
    # Layer 2 (no self-hosted for PR-touched code paths).
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for tag-triggered release uploads
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # TEMP (fix/tauri-cargo-lock-conflict): generate + pin lockfile, then
      # upload it. Reverted before the fix PR — only Cargo.lock is committed.
      - name: Generate pinned lockfile
        working-directory: client/src-tauri
        run: |
          set -euxo pipefail
          cargo generate-lockfile
          cargo update -p alloc-no-stdlib@3.0.0 --precise 2.0.4 || true
          echo "=== alloc-no-stdlib in tree ==="
          cargo tree -i alloc-no-stdlib || true

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Install Tauri OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Build Tauri app
        working-directory: client
        run: npm run tauri:build -- --bundles deb,appimage
        env:
          VITE_TAURI: '1'

      # TEMP (fix/tauri-cargo-lock-conflict): export the verified lockfile.
      - name: Upload generated Cargo.lock
        uses: actions/upload-artifact@v6
        with:
          name: cargo-lock
          path: client/src-tauri/Cargo.lock
          retention-days: 3

      - name: Upload artifacts (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: baluhost-companion-dev
          path: |
            client/src-tauri/target/release/bundle/deb/*.deb
            client/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 14

      - name: Upload to release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/src-tauri/target/release/bundle/deb/*.deb
            client/src-tauri/target/release/bundle/appimage/*.AppImage
