name: CI Check

on:
  pull_request:
    branches: [main]  # development branch retired 2026-05-06; do not re-add
  workflow_call:

permissions:
  contents: read

jobs:
  backend-tests:
    # Runner selection (#207): upstream ALWAYS uses the hardened ci-sandbox
    # runner (Layer 2, not configurable). Forks choose via the server-side
    # repo variable BACKEND_TEST_RUNNER (JSON array, set by
    # scripts/configure-ci.sh), falling back to a secret-free ubuntu-latest VM.
    # PR code cannot influence this: repository literal + vars only.
    # NOTE: the inner strings are JSON-encoded because the whole expression
    # feeds fromJSON(); the quotes in '"ubuntu-latest"' are load-bearing.
    runs-on: ${{ fromJSON(github.repository == 'Xveyn/BaluHost' && '["self-hosted","ci-sandbox"]' || vars.BACKEND_TEST_RUNNER || '"ubuntu-latest"') }}
    # ci-tests approval gate: always for upstream PRs (as before); in forks
    # only when the fork opted into a self-hosted test runner. Detection is
    # contains() on the JSON-array string written by scripts/configure-ci.sh
    # (e.g. '["self-hosted","my-box"]') — re-verify if that format changes.
    environment: ${{ (github.event_name == 'pull_request' && (github.repository == 'Xveyn/BaluHost' || contains(vars.BACKEND_TEST_RUNNER, 'self-hosted'))) && 'ci-tests' || '' }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Assert runner identity (defense-in-depth tripwire)
        # Upstream-only: asserts the hardened ci-sandbox runner identity.
        # GitHub-hosted and fork runners have different users — skip there.
        if: github.repository == 'Xveyn/BaluHost'
        run: |
          set -euo pipefail
          test "$(whoami)" = "ci-runner" || { echo "::error::Runner not running as ci-runner (got: $(whoami))"; exit 1; }
          test "$(id -u)" -ne 0 || { echo "::error::Runner running as root"; exit 1; }
          command -v podman >/dev/null || { echo "::error::podman not installed on runner host"; exit 1; }
          # Confirm ci-runner is NOT in docker/sudo/wheel.
          for grp in docker sudo wheel; do
            if id -nG "$(whoami)" | tr ' ' '\n' | grep -qx "$grp"; then
              echo "::error::ci-runner is in group '$grp' — isolation broken"
              exit 1
            fi
          done
          echo "Identity OK: $(whoami) uid=$(id -u) groups=$(id -nG)"

      - name: Lint + backend tests (with coverage) in rootless Podman container
        env:
          TEST_IMAGE: docker.io/library/python:3.11-slim
        run: |
          set -euo pipefail
          # Coverage is measured and printed only — no threshold enforced yet
          # (matches the frontend job; a low number does not fail CI). The tests
          # themselves still gate. `-o addopts=` drops the pyproject addopts
          # (term-missing + html) so CI prints the concise skip-covered table;
          # `term:skip-covered` hides 100%-covered files to keep the log short.
          # `--cov-report=json` writes backend/coverage.json (bind-mounted, so it
          # survives the container) for the job-summary step below.
          podman run --rm \
            --network=bridge \
            -v "${{ github.workspace }}:/work:Z" \
            -w /work/backend \
            -e NAS_MODE=dev \
            "$TEST_IMAGE" \
            bash -c "set -euo pipefail; pip install --no-cache-dir -e '.[dev]' && python -m ruff check . && python -m pytest -q --timeout=120 -n auto -o addopts= --cov=app --cov-report=term:skip-covered --cov-report=json"

      - name: Backend coverage → job summary
        if: always()
        env:
          TEST_IMAGE: docker.io/library/python:3.11-slim
        run: |
          set -euo pipefail
          if [ ! -f backend/coverage.json ]; then
            echo "no backend/coverage.json — skipping coverage summary"
            exit 0
          fi
          # Parse the totals inside the same pinned image (stdlib json only; no
          # pip install, no untrusted code) and append a markdown block to the
          # run summary. Numeric coercion (%d/%f) prevents any markdown injection
          # from a crafted coverage.json.
          podman run --rm \
            -v "${{ github.workspace }}:/work:Z" \
            -w /work/backend \
            "$TEST_IMAGE" \
            python -c 'import json; d=json.load(open("coverage.json"))["totals"]; print("## Backend coverage (app)\n\n| Metric | Coverage |\n|---|---|\n| lines | %.0f%% (%d/%d) |" % (d["percent_covered"], d["covered_lines"], d["num_statements"]))' \
            >> "$GITHUB_STEP_SUMMARY"

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Lint (ESLint)
        working-directory: client
        run: npx eslint .

      - name: Build
        working-directory: client
        run: npm run build

      - name: Run unit tests (with coverage)
        working-directory: client
        # Coverage is measured and printed only — no thresholds enforced yet
        # (see vite.config.ts `test.coverage`). The unit tests themselves still
        # gate the build; a low coverage number does not fail CI.
        run: npm run test:coverage

      - name: Frontend coverage → job summary
        if: always()
        working-directory: client
        # Reads the json-summary written by the coverage run and appends a
        # markdown block to the run summary. Best-effort: no-op if the file is
        # missing (e.g. tests failed before coverage was written).
        run: |
          node -e '
            const fs = require("fs");
            const p = "coverage/coverage-summary.json";
            if (!fs.existsSync(p)) process.exit(0);
            const t = JSON.parse(fs.readFileSync(p, "utf8")).total;
            const row = (k) => `| ${k} | ${t[k].pct}% (${t[k].covered}/${t[k].total}) |`;
            const md = ["## Frontend coverage (client)", "", "| Metric | Coverage |", "|---|---|", row("lines"), row("statements"), row("functions"), row("branches"), ""].join("\n");
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + "\n");
          '
