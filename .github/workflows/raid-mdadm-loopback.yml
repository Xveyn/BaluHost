name: RAID mdadm loopback integration

on:
  pull_request:
    paths:
      - 'backend/app/services/hardware/raid/**'
      - 'backend/tests/raid/**'
      - '.github/workflows/raid-mdadm-loopback.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mdadm-loopback:
    # vars.ENABLE_RAID_LOOPBACK: fork toggle (#207), default on; unset upstream.
    if: vars.ENABLE_RAID_LOOPBACK != 'false'
    # SECURITY: runs-on MUST stay ubuntu-latest and MUST NOT become
    # configurable. Real mdadm commands on a self-hosted runner could destroy
    # disks / the deployment system (see #185 and ci-cd-security.md).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install mdadm
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mdadm
      - name: Install backend (dev extras)
        working-directory: backend
        run: python -m pip install -e .[dev]
      - name: Run mdadm loopback integration tests
        working-directory: backend
        env:
          BALUHOST_MDADM_LOOPBACK: '1'
        run: |
          export PATH="/usr/sbin:/sbin:$PATH"
          python -m pytest tests/raid/test_mdadm_loopback.py -v
