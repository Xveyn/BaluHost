# Reverse proxy for Pi-hole Web UI via baluhole.local
# Install:
#   sudo cp deploy/nginx/baluhole.conf /etc/nginx/sites-available/baluhole
#   sudo ln -s /etc/nginx/sites-available/baluhole /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name baluhole.local;

    location / {
        proxy_pass http://127.0.0.1:8053;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
