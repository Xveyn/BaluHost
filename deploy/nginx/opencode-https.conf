# BaluHost Nginx - OpenCode Reverse Proxy (LAN-only)
#
# Exposes the local OpenCode server (127.0.0.1:4096) under
# https://baluhost.local:8443/. Restricted to RFC1918 networks +
# loopback because OpenCode currently has no built-in authentication.
# DO NOT relax the allow list until OPENCODE_SERVER_PASSWORD is wired up
# (see Balu_Code TODO.md - "OPENCODE_SERVER_PASSWORD verification").
#
# Place in:  /etc/nginx/sites-available/opencode
# Enable:    ln -sf /etc/nginx/sites-available/opencode /etc/nginx/sites-enabled/opencode
# Reload:    systemctl reload nginx
#
# Note: This file relies on the $connection_upgrade map defined in the
# main baluhost site config. It must be loaded alongside that site.

server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name baluhost baluhost.local 192.168.178.53 localhost _;

    # Reuse the existing BaluHost self-signed certificate (SANs cover all the
    # hostnames above).
    ssl_certificate /etc/nginx/ssl/baluhost.crt;
    ssl_certificate_key /etc/nginx/ssl/baluhost.key;
    include /etc/nginx/snippets/ssl-params.conf;

    access_log /var/log/nginx/opencode-access.log;
    error_log /var/log/nginx/opencode-error.log warn;

    # LAN-only allow list - OpenCode has no auth, so this is the entire
    # security perimeter. Remove only after OPENCODE_SERVER_PASSWORD is live.
    allow 127.0.0.1;
    allow ::1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow fc00::/7;
    deny all;

    client_max_body_size 100M;
    client_body_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:4096;
        proxy_http_version 1.1;

        # WebSocket / SSE upgrades for chat streams
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Long-running tool calls can hold the connection for many minutes
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # Real-time SSE chunks must not be buffered
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
